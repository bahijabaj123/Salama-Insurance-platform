<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🟠 MEDIUM RISK ALERT - Salama Insurance</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      line-height: 1.6;
      color: #333;
      margin: 0;
      padding: 0;
      background-color: #f9f9f9;
    }
    .container {
      max-width: 600px;
      margin: 20px auto;
      background: white;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      overflow: hidden;
      border-top: 5px solid #fd7e14;
    }
    .header {
      background: linear-gradient(135deg, #fd7e14 0%, #dc6b12 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }
    .header h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
    }
    .score-box {
      background: #fff3e0;
      border-left: 4px solid #fd7e14;
      padding: 20px;
      margin: 20px 0;
      border-radius: 5px;
      text-align: center;
    }
    .score {
      font-size: 48px;
      font-weight: 700;
      color: #fd7e14;
      line-height: 1;
    }
    .info-box {
      background: #f8f9fa;
      padding: 20px;
      margin: 15px 0;
      border-radius: 5px;
    }
    .action-box {
      background: #fd7e14;
      color: white;
      padding: 20px;
      margin: 20px 0;
      border-radius: 5px;
      text-align: center;
    }
    .button {
      display: inline-block;
      padding: 12px 30px;
      background: white;
      color: #fd7e14;
      text-decoration: none;
      border-radius: 25px;
      font-weight: 600;
    }
    .footer {
      background: #f4f4f4;
      padding: 20px;
      text-align: center;
      font-size: 12px;
      color: #666;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🟠 MEDIUM RISK ALERT</h1>
  </div>

  <div class="content">
    <div class="score-box">
      <div class="score-label">FRAUD SCORE</div>
      <div class="score" th:text="${fraudScore}">55</div>
      <div class="score-label">/100</div>
    </div>

    <div class="info-box">
      <p><strong>Reference:</strong> <span th:text="${claimReference}">CLM-20240227-1234</span></p>
      <p><strong>Score:</strong> <span th:text="${fraudScore}">55</span></p>
    </div>

    <div class="action-box">
      <h3>👁️ HUMAN VERIFICATION REQUIRED</h3>
      <a href="#" class="button" th:href="${dashboardLink}">VIEW FILE</a>
    </div>
  </div>

  <div class="footer">
    <p>Automatic email - Salama Insurance</p>
  </div>
</div>
</body>
</html>
