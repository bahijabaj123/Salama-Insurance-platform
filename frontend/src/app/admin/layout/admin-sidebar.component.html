<aside class="sidebar">
  <div class="sidebar__brand">
    <div class="sidebar__mark" aria-hidden="true">S</div>
    <div class="sidebar__brand-text">
      <span class="sidebar__brand-title">Salama</span>
      <span class="sidebar__brand-sub">Admin</span>
    </div>
  </div>

  <nav class="sidebar__nav" aria-label="Admin primary">
    @for (item of items; track item.path) {
      <a
        class="sidebar__link"
        [routerLink]="item.path"
        routerLinkActive="sidebar__link--active"
        [routerLinkActiveOptions]="{ exact: item.path === '/admin/dashboard' }"
      >
        <span class="sidebar__icon" aria-hidden="true">
          @switch (item.icon) {
            @case ('dashboard') {
              <svg viewBox="0 0 24 24">
                <path
                  fill="currentColor"
                  d="M4 13h6a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1zm0 8h6a1 1 0 0 0 1-1v-4a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1zm10 0h6a1 1 0 0 0 1-1v-8a1 1 0 0 0-1-1h-6a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1zm0-18v4a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1h-6a1 1 0 0 0-1 1z"
                />
              </svg>
            }
            @case ('users') {
              <svg viewBox="0 0 24 24">
                <path
                  fill="currentColor"
                  d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"
                />
              </svg>
            }
            @case ('requests') {
              <svg viewBox="0 0 24 24">
                <path
                  fill="currentColor"
                  d="M19 3h-4.18C14.4 1.84 13.3 1 12 1s-2.4.84-2.82 2H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2zm-7 0a1 1 0 1 1 0 2 1 1 0 0 1 0-2zm-1.06 14L6.7 12.76l1.41-1.41 2.83 2.83 5.66-5.66 1.41 1.42L10.94 17z"
                />
              </svg>
            }
          }
        </span>
        <span class="sidebar__label">{{ item.label }}</span>
      </a>
    }
  </nav>

  <div class="sidebar__footer">
    <button type="button" class="sidebar__logout" (click)="onLogout()">
      <span class="sidebar__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path
            fill="currentColor"
            d="M10.09 15.59 11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5a2 2 0 0 0-2 2v4h2V5h14v14H5v-4H3v4a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z"
          />
        </svg>
      </span>
      <span class="sidebar__label">Logout</span>
    </button>
  </div>
</aside>
