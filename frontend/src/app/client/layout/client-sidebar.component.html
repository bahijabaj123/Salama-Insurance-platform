<aside class="sidebar" [class.sidebar--collapsed]="collapsed()">
  <div class="sidebar__brand">
    <div class="sidebar__mark" aria-hidden="true">S</div>
    @if (!collapsed()) {
      <div class="sidebar__brand-text">
        <span class="sidebar__brand-title">Salama</span>
        <span class="sidebar__brand-sub">Insurance</span>
      </div>
    }
  </div>

  <nav class="sidebar__nav" aria-label="Client primary">
    @for (item of items; track item.path) {
      <a
        class="sidebar__link"
        [routerLink]="item.path"
        routerLinkActive="sidebar__link--active"
        [routerLinkActiveOptions]="{ exact: item.path === '/client/dashboard' }"
        [attr.title]="collapsed() ? item.label : null"
      >
        <span class="sidebar__icon" aria-hidden="true">
          @switch (item.icon) {
            @case ('dashboard') {
              <svg viewBox="0 0 24 24">
                <path
                  fill="currentColor"
                  d="M4 13h6a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1zm0 8h6a1 1 0 0 0 1-1v-4a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1zm10 0h6a1 1 0 0 0 1-1v-8a1 1 0 0 0-1-1h-6a1 1 0 0 0-1 1v8a1 1 0 0 0 1 1zm0-18v4a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1h-6a1 1 0 0 0-1 1z"
                />
              </svg>
            }
            @case ('contract') {
              <svg viewBox="0 0 24 24">
                <path
                  fill="currentColor"
                  d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm4 18H6V4h7v5h5v11z"
                />
              </svg>
            }
            @case ('history') {
              <svg viewBox="0 0 24 24">
                <path
                  fill="currentColor"
                  d="M13 3a9 9 0 0 0-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0 0 13 21a9 9 0 0 0 0-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"
                />
              </svg>
            }
            @case ('claims') {
              <svg viewBox="0 0 24 24">
                <path
                  fill="currentColor"
                  d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"
                />
              </svg>
            }
            @case ('expert') {
              <svg viewBox="0 0 24 24">
                <path
                  fill="currentColor"
                  d="M22.7 19l-9.1-9.1c.9-2.3.4-5-1.5-6.9-2-2-5-2.4-7.4-1.3L9 6 6 9 1.6 4.7C.4 7.1.9 10.1 2.9 12.1c1.9 1.9 4.6 2.4 6.9 1.5l9.1 9.1c.4.4 1 .4 1.4 0l2.3-2.3c.5-.4.5-1.1.1-1.4z"
                />
              </svg>
            }
            @case ('profile') {
              <svg viewBox="0 0 24 24">
                <path
                  fill="currentColor"
                  d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"
                />
              </svg>
            }
          }
        </span>
        @if (!collapsed()) {
          <span class="sidebar__label">{{ item.label }}</span>
        }
      </a>
    }
  </nav>

  <div class="sidebar__footer">
    <button type="button" class="sidebar__logout" (click)="onLogout()" [attr.title]="collapsed() ? 'Logout' : null">
      <span class="sidebar__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24">
          <path
            fill="currentColor"
            d="M10.09 15.59 11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5a2 2 0 0 0-2 2v4h2V5h14v14H5v-4H3v4a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V5a2 2 0 0 0-2-2z"
          />
        </svg>
      </span>
      @if (!collapsed()) {
        <span class="sidebar__label">Logout</span>
      }
    </button>
  </div>
</aside>
