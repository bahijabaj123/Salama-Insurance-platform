<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Mise à jour sinistre</title>
  <style>
    body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
    .container { max-width: 600px; margin: 0 auto; background: #f4f6f9; }
    .header { background: #185FA5; color: white; padding: 30px; text-align: center; }
    .content { padding: 30px; background: white; }
    .status-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-weight: bold; background: #185FA5; color: white; }
    .info-box { background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 20px 0; }
    .button { background: #185FA5; color: white; padding: 12px 24px; text-decoration: none; border-radius: 5px; display: inline-block; }
    .footer { text-align: center; padding: 20px; font-size: 12px; color: #666; }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Salama Insurance</h1>
  </div>
  <div class="content">
    <h2>Bonjour <span th:text="${clientName}">Client</span>,</h2>
    <p>Votre sinistre <strong th:text="${claimReference}">REF</strong> a été mis à jour.</p>

    <div class="info-box">
      <p><strong>Statut :</strong> <span class="status-badge" th:text="${status}">Statut</span></p>
      <p><strong>Région :</strong> <span th:text="${region}">Région</span></p>
      <p><strong>Date d'ouverture :</strong> <span th:text="${openingDate}">Date</span></p>
      <p><strong>Score d'urgence :</strong> <span th:text="${urgencyScore}">0</span>%</p>
    </div>

    <p th:text="${customMessage}">Message personnalisé de l'assureur</p>

    <p style="margin-top: 30px; text-align: center;">
      <a class="button" th:href="${dashboardLink}" target="_blank">Suivre mon sinistre</a>
    </p>
  </div>
  <div class="footer">
    <p>Salama Insurance - Votre assureur de confiance</p>
    <p>&copy; <span th:text="${currentYear}">2026</span> Salama Insurance</p>
  </div>
</div>
</body>
</html>
