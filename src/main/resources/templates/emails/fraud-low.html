<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>✅ Automatic Processing - Salama Insurance</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
    }
    .container {
      max-width: 600px;
      margin: 20px auto;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      border-top: 5px solid #28a745;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    .header {
      background: linear-gradient(135deg, #28a745 0%, #1e7e34 100%);
      color: white;
      padding: 30px;
      text-align: center;
    }
    .content {
      padding: 30px;
    }
    .info {
      background: #f8f9fa;
      padding: 20px;
      border-radius: 5px;
      margin-top: 20px;
    }
    .footer {
      background: #f4f4f4;
      padding: 20px;
      text-align: center;
      font-size: 12px;
      color: #666;
      border-top: 1px solid #ddd;
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>✅ Automatic Processing</h1>
  </div>
  <div class="content">
    <p>The claim <strong th:text="${claimReference}">CLM-1234</strong> has been analyzed with low risk.</p>
    <div class="info">
      <p><strong>Score:</strong> <span th:text="${fraudScore}">15</span>/100</p>
      <p><strong>Status:</strong> Automatic processing in progress</p>
    </div>
  </div>
  <div class="footer">
    <p>Salama Insurance - Your trusted insurer</p>
  </div>
</div>
</body>
</html>
