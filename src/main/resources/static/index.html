<!DOCTYPE html>
<html lang="fr">
<head>

  <meta charset="UTF-8">
  <title>Salama - Gestion des Plaintes</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; padding-top: 50px; }
    .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 450px; }
    textarea { width: 100%; height: 100px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; box-sizing: border-box; }
    button { width: 100%; background: #27ae60; color: white; border: none; padding: 12px; border-radius: 8px; margin-top: 15px; cursor: pointer; font-weight: bold; }
    #result { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; text-align: center; font-weight: bold; }
    .negatif { background: #fadbd8; border: 2px solid #e74c3c; color: #c0392b; }
    .positif { background: #d4efdf; border: 2px solid #27ae60; color: #145a32; }
  </style>
</head>
<body>
<div class="card">
  <h2>📩 Nouvelle Réclamation</h2>
  <textarea id="claimText" placeholder="Saisissez le message du client..."></textarea>
  <button onclick="analyze()">Analyser & Enregistrer</button>
  <div id="result"></div>
</div>

<script>
  async function analyze() {
    const text = document.getElementById('claimText').value;
    const resDiv = document.getElementById('result');
    const response = await fetch('/api/complaints/test-ai', {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: text
    });
    const data = await response.json();
    resDiv.style.display = 'block';
    resDiv.className = data.detectedSentiment === 'NÉGATIF' ? 'negatif' : 'positif';
    resDiv.innerHTML = 'Sentiment : ${data.detectedSentiment}<br>Priorité : ${data.priority}';
       }
</script>
</body>
</html>
